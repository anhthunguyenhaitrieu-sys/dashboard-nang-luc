<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống đánh giá</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Lexend', sans-serif; }</style>
</head>
<body class="bg-gradient-to-tr from-blue-600 to-indigo-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex p-4 bg-indigo-100 text-indigo-600 rounded-full mb-3 text-3xl">
                <i class="fa-solid fa-chart-pie"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Hệ Thống Đánh Giá</h2>
            <p class="text-gray-500 text-sm mt-1">Vui lòng đăng nhập để xem báo cáo năng lực</p>
        </div>
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" id="email" required class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl outline-none" placeholder="name@company.com">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" required class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl outline-none" placeholder="••••••••">
                </div>
            </div>
            <div id="errorMsg" class="text-red-500 text-sm hidden text-center font-medium">
                <i class="fa-solid fa-triangle-exclamation mr-1"></i> Email hoặc mật khẩu không chính xác!
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl shadow-lg transition duration-200">
                Đăng Nhập <i class="fa-solid fa-arrow-right ml-1"></i>
            </button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(email === 'anhthunguyen.haitrieu@gmail.com' && pass === '123456') {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
